<?xml version="1.0" encoding="UTF-8"?>
<svg width="720" height="500" viewBox="0 0 720 500" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="720" height="500" fill="#0f172a"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#0ea5e9">Basic Extraction Flow  (-D)</text>
  <text x="360" y="52" text-anchor="middle" font-size="11" fill="#64748b">Load STIX · filter · extract procedures · write CSV  (no XLSX, no citations)</text>

  <!-- Step 1 -->
  <rect x="200" y="68" width="320" height="44" rx="6" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="360" y="87" text-anchor="middle" font-size="12" font-weight="bold" fill="#e0f2fe">Load STIX Bundle</text>
  <text x="360" y="104" text-anchor="middle" font-size="10" fill="#94a3b8">Fetched from TAXII or loaded from disk  (auto-refreshed every 7 days)</text>
  <line x1="360" y1="112" x2="360" y2="134" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="200" y="134" width="320" height="54" rx="6" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="360" y="153" text-anchor="middle" font-size="12" font-weight="bold" fill="#c4b5fd">Apply Filters</text>
  <text x="360" y="169" text-anchor="middle" font-size="10" fill="#94a3b8">-f framework  ·  -g groups / aliases  ·  -p platforms  ·  -s search terms</text>
  <text x="360" y="181" text-anchor="middle" font-size="10" fill="#64748b">Groups not matching any filter are skipped entirely</text>
  <line x1="360" y1="188" x2="360" y2="210" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="200" y="210" width="320" height="54" rx="6" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="360" y="229" text-anchor="middle" font-size="12" font-weight="bold" fill="#e0f2fe">Extract Procedures</text>
  <text x="360" y="245" text-anchor="middle" font-size="10" fill="#94a3b8">Per-group: techniques · procedure text · tactics · platforms</text>
  <text x="360" y="257" text-anchor="middle" font-size="10" fill="#64748b">Indicators extracted from backtick/quoted strings, registry, paths, ports, CVEs</text>
  <line x1="360" y1="264" x2="360" y2="286" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="200" y="286" width="320" height="54" rx="6" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="360" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="#e0f2fe">Build Output</text>
  <text x="360" y="321" text-anchor="middle" font-size="10" fill="#94a3b8">Consolidate procedures · deduplicate · attach detection guidance</text>
  <text x="360" y="333" text-anchor="middle" font-size="10" fill="#64748b">Sysmon EIDs · log sources · ATT&amp;CK technique URL</text>
  <line x1="360" y1="340" x2="360" y2="362" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <rect x="200" y="362" width="320" height="44" rx="6" fill="#1e293b" stroke="#4ade80" stroke-width="1.5"/>
  <text x="360" y="381" text-anchor="middle" font-size="12" font-weight="bold" fill="#86efac">Write mitre_procedures.csv</text>
  <text x="360" y="397" text-anchor="middle" font-size="10" fill="#94a3b8">RFC 4180 CSV · one row per group+technique · SIEM-ready</text>
  <line x1="360" y1="406" x2="360" y2="428" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Note on -n -->
  <rect x="200" y="428" width="320" height="44" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="360" y="447" text-anchor="middle" font-size="11" font-weight="bold" fill="#fcd34d">+ ATT&amp;CK Navigator Layers  (optional -n)</text>
  <text x="360" y="462" text-anchor="middle" font-size="10" fill="#94a3b8">Per-group JSON layers downloaded from attack.mitre.org</text>
</svg>
