<?xml version="1.0" encoding="UTF-8"?>
<svg width="780" height="560" viewBox="0 0 780 560" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#38bdf8"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
    <marker id="arr-o" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fb923c"/>
    </marker>
    <marker id="arr-y" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#facc15"/>
    </marker>
  </defs>

  <rect width="780" height="560" fill="#0f172a"/>

  <text x="390" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#0ea5e9">Retry / Cache Management Flows  (-rS  -rN  -rJ  --clear-cache)</text>
  <text x="390" y="50" text-anchor="middle" font-size="11" fill="#64748b">These flags run before the main extraction and manipulate the citation cache</text>

  <!-- Three columns: -rS | -rN | -rJ -->

  <!-- Column: -rS -->
  <rect x="20" y="68" width="220" height="26" rx="4" fill="#1e293b" stroke="#fb923c" stroke-width="1.5"/>
  <text x="130" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#fdba74">-rS  / --retry-stix</text>

  <rect x="20" y="104" width="220" height="44" rx="5" fill="#1e293b" stroke="#fb923c" stroke-width="1.2"/>
  <text x="130" y="123" text-anchor="middle" font-size="11" fill="#94a3b8">Check .last_retry_stix marker</text>
  <text x="130" y="137" text-anchor="middle" font-size="10" fill="#64748b">If &lt;30 days old → warn + prompt</text>
  <text x="130" y="149" text-anchor="middle" font-size="10" fill="#64748b">(prevents thrashing same URLs)</text>

  <line x1="130" y1="148" x2="130" y2="168" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arr-o)"/>
  <rect x="20" y="168" width="220" height="34" rx="5" fill="#1e293b" stroke="#fb923c" stroke-width="1.2"/>
  <text x="130" y="183" text-anchor="middle" font-size="11" fill="#94a3b8">Remove cache entries where</text>
  <text x="130" y="197" text-anchor="middle" font-size="10" fill="#fdba74">method == "stix_metadata"</text>

  <line x1="130" y1="202" x2="130" y2="222" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arr-o)"/>
  <rect x="20" y="222" width="220" height="30" rx="5" fill="#14532d" stroke="#4ade80" stroke-width="1.2"/>
  <text x="130" y="237" text-anchor="middle" font-size="11" fill="#86efac">Write .last_retry_stix marker</text>
  <text x="130" y="249" text-anchor="middle" font-size="10" fill="#64748b">Cleared entries re-fetched on next run</text>

  <!-- Column: -rN -->
  <rect x="280" y="68" width="220" height="26" rx="4" fill="#1e293b" stroke="#f87171" stroke-width="1.5"/>
  <text x="390" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#fca5a5">-rN  / --retry-nocontent</text>

  <rect x="280" y="104" width="220" height="34" rx="5" fill="#1e293b" stroke="#f87171" stroke-width="1.2"/>
  <text x="390" y="120" text-anchor="middle" font-size="11" fill="#94a3b8">Scan .citation_cache/ for entries</text>
  <text x="390" y="134" text-anchor="middle" font-size="10" fill="#fca5a5">method == "no_content" or empty</text>

  <line x1="390" y1="138" x2="390" y2="158" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="280" y="158" width="220" height="34" rx="5" fill="#1e293b" stroke="#f87171" stroke-width="1.2"/>
  <text x="390" y="173" text-anchor="middle" font-size="11" fill="#94a3b8">Delete matching cache entries</text>
  <text x="390" y="187" text-anchor="middle" font-size="10" fill="#64748b">No cooldown check — always runs</text>

  <line x1="390" y1="192" x2="390" y2="212" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="280" y="212" width="220" height="30" rx="5" fill="#14532d" stroke="#4ade80" stroke-width="1.2"/>
  <text x="390" y="227" text-anchor="middle" font-size="11" fill="#86efac">Cleared entries re-fetched on next run</text>
  <text x="390" y="241" text-anchor="middle" font-size="10" fill="#64748b">Useful after installing Playwright</text>

  <!-- Column: -rJ -->
  <rect x="540" y="68" width="220" height="26" rx="4" fill="#1e293b" stroke="#4ade80" stroke-width="1.5"/>
  <text x="650" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#86efac">-rJ [YAML] / --retry-js</text>

  <rect x="540" y="104" width="220" height="44" rx="5" fill="#1e293b" stroke="#4ade80" stroke-width="1.2"/>
  <text x="650" y="121" text-anchor="middle" font-size="11" fill="#94a3b8">Load URL list from citations_failed.yaml</text>
  <text x="650" y="135" text-anchor="middle" font-size="10" fill="#64748b">Or scan cache for empty entries (no YAML)</text>
  <text x="650" y="147" text-anchor="middle" font-size="10" fill="#64748b">Only stix_metadata / no_content entries</text>

  <line x1="650" y1="148" x2="650" y2="168" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <rect x="540" y="168" width="220" height="44" rx="5" fill="#1e293b" stroke="#4ade80" stroke-width="1.2"/>
  <text x="650" y="185" text-anchor="middle" font-size="11" font-weight="bold" fill="#86efac">Playwright headed browser</text>
  <text x="650" y="199" text-anchor="middle" font-size="10" fill="#94a3b8">headless=False · inner_text('body')</text>
  <text x="650" y="211" text-anchor="middle" font-size="10" fill="#64748b">Bypasses Cloudflare fingerprinting</text>

  <line x1="650" y1="212" x2="650" y2="232" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <rect x="540" y="232" width="220" height="30" rx="5" fill="#14532d" stroke="#4ade80" stroke-width="1.2"/>
  <text x="650" y="247" text-anchor="middle" font-size="11" fill="#86efac">Write results to cache</text>
  <text x="650" y="258" text-anchor="middle" font-size="10" fill="#64748b">Recovered URLs available on next run</text>

  <!-- --clear-cache row -->
  <rect x="20" y="296" width="740" height="44" rx="5" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="390" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#fca5a5">--clear-cache  (nuclear option)</text>
  <text x="390" y="331" text-anchor="middle" font-size="10" fill="#94a3b8">Deletes entire  data/.citation_cache/  directory  ·  all ~5000+ entries removed  ·  next run re-fetches everything from scratch</text>

  <!-- Combined note -->
  <rect x="20" y="358" width="740" height="44" rx="5" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="390" y="375" text-anchor="middle" font-size="12" font-weight="bold" fill="#94a3b8">Combining Retry Flags</text>
  <text x="390" y="391" text-anchor="middle" font-size="10" fill="#64748b">-rS -rN -D -E -C  →  retry all failures while keeping successful cache entries  (recommended for iterative enrichment)</text>

  <!-- Flow: these run before main -->
  <rect x="20" y="420" width="740" height="60" rx="5" fill="#1e293b" stroke="#38bdf8" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="390" y="440" text-anchor="middle" font-size="11" font-weight="bold" fill="#7fb3d3">Execution order within a single MITRESaw.py call</text>
  <text x="390" y="458" text-anchor="middle" font-size="10" fill="#94a3b8">1. --clear-cache  →  2. -rS  →  3. -rN  →  4. -rJ  →  5. -I  →  6. main extraction  (-D -E -C)</text>
  <text x="390" y="474" text-anchor="middle" font-size="10" fill="#64748b">All cache operations complete before STIX data is loaded  ·  changes take effect in the same run</text>

  <!-- -I / manual import -->
  <rect x="20" y="498" width="740" height="44" rx="5" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="390" y="515" text-anchor="middle" font-size="12" font-weight="bold" fill="#c4b5fd">-I [DIR] / --import-citations</text>
  <text x="390" y="531" text-anchor="middle" font-size="10" fill="#94a3b8">Reads .pdf / .html / .htm / .txt files from directory  ·  parses content  ·  writes to cache keyed by filename URL  ·  then main run uses cached content</text>
</svg>
