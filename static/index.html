<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MITRESaw</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0D1B2A; color: #CBD5E1; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

  .header { background: #0A1220; padding: 16px 24px; border-bottom: 1px solid #1E3A5F; display: flex; align-items: center; gap: 16px; }
  .header h1 { color: #0EA5E9; font-size: 20px; }
  .header .subtitle { color: #64748B; font-size: 12px; }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

  .card { background: #0F1C2E; border: 1px solid #1E3A5F; border-radius: 8px; padding: 20px; }
  .card h2 { color: #E0F2FE; font-size: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

  label { display: block; color: #94A3B8; font-size: 12px; margin-bottom: 4px; }
  input, select, textarea { width: 100%; background: #0A1220; border: 1px solid #1E3A5F; color: #E0F2FE; padding: 8px 12px; border-radius: 4px; font-family: inherit; font-size: 13px; margin-bottom: 12px; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #0EA5E9; }
  textarea { font-family: 'Courier New', monospace; resize: vertical; }

  .btn { background: #0EA5E9; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn:hover { background: #0284C7; }
  .btn:disabled { background: #334155; cursor: not-allowed; }
  .btn-red { background: #DC2626; }
  .btn-red:hover { background: #B91C1C; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-outline { background: transparent; border: 1px solid #1E3A5F; color: #94A3B8; }
  .btn-outline:hover { border-color: #0EA5E9; color: #0EA5E9; }

  .actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .log-box { background: #000; border: 1px solid #1E3A5F; border-radius: 4px; padding: 12px; font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.6; max-height: 500px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; color: #A0AEC0; }

  .status-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .status-idle { background: #1E3A5F; color: #94A3B8; }
  .status-running { background: #0E4429; color: #4ADE80; animation: pulse 1.5s infinite; }
  .status-done { background: #14532D; color: #22C55E; }
  .status-error { background: #450A0A; color: #F87171; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

  .file-list { list-style: none; }
  .file-list li { padding: 8px 0; border-bottom: 1px solid #1E3A5F; display: flex; justify-content: space-between; align-items: center; }
  .file-list li:last-child { border-bottom: none; }
  .file-name { color: #0EA5E9; cursor: pointer; text-decoration: none; }
  .file-name:hover { text-decoration: underline; }
  .file-size { color: #64748B; font-size: 12px; }

  .stats { display: flex; gap: 20px; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat .num { font-size: 24px; font-weight: 700; color: #0EA5E9; }
  .stat .lbl { font-size: 11px; color: #64748B; }

  .excl-table { width: 100%; border-collapse: collapse; }
  .excl-table th { text-align: left; color: #94A3B8; font-size: 12px; padding: 6px 8px; border-bottom: 1px solid #1E3A5F; }
  .excl-table td { padding: 4px 8px; }
  .excl-table input { margin-bottom: 0; }
  .excl-row-del { color: #F87171; cursor: pointer; font-size: 16px; }

  .checkbox-group { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
  .checkbox-group label { display: flex; align-items: center; gap: 6px; color: #CBD5E1; font-size: 13px; cursor: pointer; }
  .checkbox-group input[type=checkbox] { width: auto; margin: 0; }

  .section-full { grid-column: 1 / -1; }
</style>
</head>
<body>

<div class="header">
  <h1>MITRESaw</h1>
  <span class="subtitle">MITRE ATT&CK Evidence Extraction &amp; Citation Collection</span>
  <span id="statusBadge" class="status-badge status-idle">Idle</span>
</div>

<div class="container">
  <div class="grid">

    <!-- Run Configuration -->
    <div class="card">
      <h2>Run Configuration</h2>
      <label>Flags</label>
      <input id="flags" value="-D -E -C" placeholder="-D -E -C -g APT29 -p Windows">

      <div class="checkbox-group">
        <label><input type="checkbox" id="flagD" checked> -D Default</label>
        <label><input type="checkbox" id="flagE" checked> -E Evidence</label>
        <label><input type="checkbox" id="flagC" checked> -C Citations</label>
        <label><input type="checkbox" id="flagQ"> -Q Queries</label>
        <label><input type="checkbox" id="flagq"> -q Quiet</label>
        <label><input type="checkbox" id="flagrS"> -rS Retry STIX</label>
        <label><input type="checkbox" id="flagrN"> -rN Retry No-Content</label>
        <label><input type="checkbox" id="flagCC"> --clear-cache</label>
      </div>

      <label>Groups (comma-separated, optional)</label>
      <input id="groups" placeholder="APT29,APT33,OilRig">

      <label>Platforms (optional)</label>
      <input id="platforms" placeholder="Windows,Linux">

      <label>Citation Workers (1-50)</label>
      <input id="workers" type="number" value="10" min="1" max="50">

      <div class="actions">
        <button class="btn" id="runBtn" onclick="startRun()">Run MITRESaw</button>
        <button class="btn btn-red btn-sm" id="stopBtn" onclick="stopRun()" disabled>Stop</button>
      </div>
    </div>

    <!-- Cache & Stats -->
    <div class="card">
      <h2>Cache &amp; Statistics</h2>
      <div class="stats" id="cacheStats">
        <div class="stat"><div class="num" id="statTotal">-</div><div class="lbl">Total Cached</div></div>
        <div class="stat"><div class="num" id="statSuccess">-</div><div class="lbl">Success</div></div>
        <div class="stat"><div class="num" id="statFailed">-</div><div class="lbl">Failed</div></div>
        <div class="stat"><div class="num" id="statSize">-</div><div class="lbl">MB</div></div>
      </div>
      <br>
      <div class="actions">
        <button class="btn btn-sm btn-outline" onclick="loadCacheStats()">Refresh</button>
      </div>
    </div>

    <!-- Log Output -->
    <div class="card section-full">
      <h2>Output Log</h2>
      <div class="log-box" id="logBox">Ready. Configure flags and click Run.</div>
    </div>

    <!-- Results -->
    <div class="card">
      <h2>Output Files</h2>
      <ul class="file-list" id="fileList">
        <li style="color:#64748B">No files yet</li>
      </ul>
      <br>
      <button class="btn btn-sm btn-outline" onclick="loadResults()">Refresh</button>
    </div>

    <!-- Exclusions -->
    <div class="card">
      <h2>Exclusions</h2>
      <table class="excl-table" id="exclTable">
        <thead><tr><th>Indicator</th><th>Reason</th><th></th></tr></thead>
        <tbody id="exclBody"></tbody>
      </table>
      <br>
      <div class="actions">
        <button class="btn btn-sm btn-outline" onclick="addExclusion()">+ Add</button>
        <button class="btn btn-sm" onclick="saveExclusions()">Save</button>
      </div>
    </div>

  </div>
</div>

<script>
const logBox = document.getElementById('logBox');
const badge = document.getElementById('statusBadge');
let eventSource = null;

// Build flags from checkboxes + manual input
function buildFlags() {
  let flags = [];
  if (document.getElementById('flagD').checked) flags.push('-D');
  if (document.getElementById('flagE').checked) flags.push('-E');
  if (document.getElementById('flagC').checked) flags.push('-C');
  if (document.getElementById('flagQ').checked) flags.push('-Q');
  if (document.getElementById('flagq').checked) flags.push('-q');
  if (document.getElementById('flagrS').checked) flags.push('-rS');
  if (document.getElementById('flagrN').checked) flags.push('-rN');
  if (document.getElementById('flagCC').checked) flags.push('--clear-cache');
  const g = document.getElementById('groups').value.trim();
  if (g) flags.push('-g', g);
  const p = document.getElementById('platforms').value.trim();
  if (p) flags.push('-p', p);
  const w = parseInt(document.getElementById('workers').value) || 10;
  if (w !== 10) flags.push('-w', Math.max(1, Math.min(50, w)));
  return flags.join(' ');
}

async function startRun() {
  const flags = buildFlags();
  document.getElementById('flags').value = flags;
  logBox.textContent = '';
  badge.className = 'status-badge status-running';
  badge.textContent = 'Running';
  document.getElementById('runBtn').disabled = true;
  document.getElementById('stopBtn').disabled = false;

  const resp = await fetch('/api/run', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({flags})
  });
  if (!resp.ok) {
    const err = await resp.json();
    alert(err.error || 'Failed to start');
    badge.className = 'status-badge status-idle';
    badge.textContent = 'Idle';
    document.getElementById('runBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
    return;
  }

  // Stream log via SSE
  eventSource = new EventSource('/api/log/stream');
  eventSource.addEventListener('log', e => {
    // Strip ANSI codes for display
    const clean = e.data.replace(/\x1b\[[0-9;]*m/g, '');
    logBox.textContent += clean + '\n';
    logBox.scrollTop = logBox.scrollHeight;
  });
  eventSource.addEventListener('done', e => {
    const data = JSON.parse(e.data);
    eventSource.close();
    document.getElementById('runBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
    if (data.error) {
      badge.className = 'status-badge status-error';
      badge.textContent = 'Error';
    } else {
      badge.className = 'status-badge status-done';
      badge.textContent = 'Complete';
    }
    loadResults();
    loadCacheStats();
  });
  eventSource.onerror = () => {
    eventSource.close();
    badge.className = 'status-badge status-error';
    badge.textContent = 'Disconnected';
    document.getElementById('runBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
  };
}

async function stopRun() {
  await fetch('/api/stop', {method: 'POST'});
  if (eventSource) eventSource.close();
  badge.className = 'status-badge status-idle';
  badge.textContent = 'Stopped';
  document.getElementById('runBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
}

async function loadResults() {
  const resp = await fetch('/api/results');
  const data = await resp.json();
  const list = document.getElementById('fileList');
  if (!data.files.length) {
    list.innerHTML = '<li style="color:#64748B">No files yet</li>';
    return;
  }
  list.innerHTML = data.files.map(f => {
    const size = f.size > 1024*1024 ? (f.size/1024/1024).toFixed(1)+'MB' : (f.size/1024).toFixed(0)+'KB';
    return `<li><a class="file-name" href="/api/results/download?path=${encodeURIComponent(f.path)}">${f.name}</a><span class="file-size">${size}</span></li>`;
  }).join('');
}

async function loadCacheStats() {
  const resp = await fetch('/api/cache/stats');
  const d = await resp.json();
  document.getElementById('statTotal').textContent = d.total;
  document.getElementById('statSuccess').textContent = d.success;
  document.getElementById('statFailed').textContent = d.failed;
  document.getElementById('statSize').textContent = d.size_mb;
}

async function loadExclusions() {
  const resp = await fetch('/api/exclusions');
  const data = await resp.json();
  const body = document.getElementById('exclBody');
  body.innerHTML = '';
  data.exclusions.forEach(r => addExclusionRow(r.indicator, r.reason));
}

function addExclusionRow(indicator='', reason='') {
  const body = document.getElementById('exclBody');
  const tr = document.createElement('tr');
  tr.innerHTML = `<td><input value="${indicator}" class="excl-ind"></td><td><input value="${reason}" class="excl-reason"></td><td><span class="excl-row-del" onclick="this.closest('tr').remove()">x</span></td>`;
  body.appendChild(tr);
}

function addExclusion() { addExclusionRow(); }

async function saveExclusions() {
  const rows = [];
  document.querySelectorAll('#exclBody tr').forEach(tr => {
    const ind = tr.querySelector('.excl-ind').value.trim();
    const reason = tr.querySelector('.excl-reason').value.trim();
    if (ind) rows.push({indicator: ind, reason});
  });
  await fetch('/api/exclusions', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({exclusions: rows})
  });
  alert('Exclusions saved');
}

// Init
loadResults();
loadCacheStats();
loadExclusions();
</script>
</body>
</html>
