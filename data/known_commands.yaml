# MITRESaw — Known single-word command/tool allowlist
#
# Purpose: classify backtick-quoted single tokens in citation text that would
# otherwise be missed by the multi-word / flag heuristics in
# extract_indicators_from_text().
#
# Structure:  platform → indicator_type → list of lowercase tokens
# Platforms:  windows | linux | macos | cross_platform
# Types:      cmd  (executables, built-ins, LOLBins, interpreters)
#             software  (known offensive tools, implants, C2 frameworks)
#
# The loader in citation_collector.py flattens all cmd entries into
# _KNOWN_CMD_NAMES and all software entries into _KNOWN_SOFTWARE_NAMES.
# Matching is case-insensitive.
#
# Adding entries: keep alphabetical within each section for readability.
# Do NOT add multi-word entries here — those are already caught by the
# "len(bt.split()) >= 2" rule in extract_indicators_from_text().

# ---------------------------------------------------------------------------
# Windows
# ---------------------------------------------------------------------------
